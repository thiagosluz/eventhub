name: EventHub CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- BACKEND PIPELINE ---
  backend-qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit Tests with Coverage
        run: npm run test:cov

      - name: Enforce Coverage Thresholds
        run: npm run test:cov:check

      - name: Build
        run: npm run build

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/coverage/lcov.info
            backend/coverage/coverage-summary.json
            backend/coverage/cobertura-coverage.xml
          retention-days: 14

  # --- FRONTEND PIPELINE ---
  frontend-qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests with Coverage
        run: npm run test:coverage

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/lcov.info
            frontend/coverage/coverage-summary.json
            frontend/coverage/coverage-final.json
          retention-days: 14

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: E2E Tests (Playwright)
        run: npm run test:e2e
        env:
          NODE_ENV: test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # --- STORYBOOK + CHROMATIC ---
  # Builds Storybook on every push/PR and optionally publishes to Chromatic
  # when CHROMATIC_PROJECT_TOKEN is configured as a repository secret.
  chromatic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for Chromatic baselines
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storybook-static
          path: frontend/storybook-static
          retention-days: 7

      - name: Publish to Chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: frontend
          storybookBuildDir: storybook-static
          exitZeroOnChanges: true
          onlyChanged: true
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  # --- DOCKER BUILD CHECK ---
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-qa, frontend-qa]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: eventhub/backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: eventhub/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3000
            NEXT_PUBLIC_APP_URL=http://localhost:3001
